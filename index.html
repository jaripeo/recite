<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!--
        viewport-fit=cover extends content under the notch/Dynamic Island.
        maximum-scale=1 prevents iOS double-tap zoom without breaking accessibility zoom.
        height=device-height forces correct dvh behaviour in Safari 15.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

    <title>TTS Reader</title>

    <!-- ── PWA / iOS Home Screen ──────────────────────────────────────────────── -->
    <!-- These MUST be static <meta> tags — Safari reads them before JS runs.    -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TTS Reader">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007AFF">

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ── Top Navigation Bar ──────────────────────────────────────────────── -->
    <header id="topBar">
        <button id="menuBtn" class="icon-btn" aria-label="Table of Contents">☰</button>
        <div class="app-title">TTS Reader</div>
        <div id="statusMessage" data-state="idle">Ready</div>
        <button id="wakeLockBtn" class="icon-btn" aria-label="Wake Lock: off" title="Keep screen awake while reading">💡</button>
    </header>

    <!-- ── Main Reader ─────────────────────────────────────────────────────── -->
    <main id="readerContainer">
        <textarea
            id="plainTextMode"
            placeholder="Paste text here — or tap ⚙ to open an EPUB…"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
        ></textarea>
        <div id="renderedTextMode"></div>
        <div id="epubMode"></div>

        <!-- Transparent overlay in the parent document — catches all EPUB taps
             before epub.js's iframe handlers can intercept them on iOS. -->
        <div id="epubTapOverlay"></div>
    </main>

    <!-- ── Fixed Bottom Playback Bar ───────────────────────────────────────── -->
    <footer id="bottomBar">
        <div id="progressRow">
            <progress id="readingProgress" value="0" max="100" aria-label="Reading progress"></progress>
            <span id="progressPercentage">0%</span>
        </div>
        <div id="playbackRow">
            <button id="prevBtn" class="play-btn" disabled aria-label="Previous page">
                <span class="btn-icon">❮</span>
                <span class="btn-label">Prev</span>
            </button>
            <button id="playToggleBtn" class="play-btn" aria-label="Play">
                <span class="btn-icon">▶</span>
                <span class="btn-label">Play</span>
            </button>
            <button id="nextBtn" class="play-btn" disabled aria-label="Next page">
                <span class="btn-icon">❯</span>
                <span class="btn-label">Next</span>
            </button>
            <button id="settingsToggleBtn" class="play-btn" aria-label="Settings">
                <span class="btn-icon">⚙</span>
                <span class="btn-label">Settings</span>
            </button>
        </div>
    </footer>

    <!-- ── Settings Bottom Sheet ───────────────────────────────────────────── -->
    <div id="settingsSheet" class="bottom-sheet" role="dialog" aria-modal="true" aria-label="Settings">
        <div class="sheet-handle-row" id="settingsHandle">
            <div class="sheet-handle"></div>
        </div>
        <div class="sheet-header">
            <span class="sheet-title">Settings</span>
            <button class="sheet-done-btn">Done</button>
        </div>
        <div class="sheet-scroll">

            <!-- File open — styled as a primary CTA -->
            <div class="sheet-section">
                <span class="sheet-label">Book</span>
                <label for="epubInput" class="file-open-label">
                    📖 &nbsp;Open EPUB File
                </label>
                <!-- accept=".epub" opens the iOS Files app directly -->
                <input type="file" id="epubInput" accept=".epub" class="sr-only">
            </div>

            <!-- Document stats -->
            <div class="sheet-section">
                <span class="sheet-label">Document</span>
                <div class="stats-strip">
                    <span id="charCountDisplay">Chars: 0</span>
                    <span id="wordCountDisplay">Words: 0</span>
                    <span id="estTimeDisplay">Est: 0 min</span>
                </div>
            </div>

            <!-- Voice language filter -->
            <div class="sheet-section">
                <label class="sheet-label" for="voiceFilterLang">Language</label>
                <select id="voiceFilterLang" class="sheet-select">
                    <option value="all">All Languages</option>
                </select>
            </div>

            <!-- Voice gender filter -->
            <div class="sheet-section">
                <label class="sheet-label" for="voiceFilterGender">Gender</label>
                <select id="voiceFilterGender" class="sheet-select">
                    <option value="all">All Genders</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
            </div>

            <!-- Voice select -->
            <div class="sheet-section">
                <label class="sheet-label" for="voiceSelect">Voice</label>
                <select id="voiceSelect" class="sheet-select">
                    <option value="">Loading voices…</option>
                </select>
            </div>

            <!-- Voice management actions -->
            <div class="sheet-section">
                <span class="sheet-label">Voice Actions</span>
                <div class="btn-row">
                    <button id="favoriteVoiceBtn" class="action-btn">★ Favourite</button>
                    <button id="hideVoiceBtn" class="action-btn">✕ Hide</button>
                    <button id="clearHiddenVoicesBtn" class="action-btn">↺ Restore</button>
                </div>
            </div>

            <!-- Playback speed -->
            <div class="sheet-section">
                <label class="sheet-label" for="speedRange">Playback Speed</label>
                <div class="speed-row">
                    <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1"
                           aria-label="Playback speed">
                    <span id="speedValue">1x</span>
                </div>
            </div>

        </div>
    </div>

    <!-- ── TOC Bottom Sheet ─────────────────────────────────────────────────── -->
    <div id="tocSheet" class="bottom-sheet" role="dialog" aria-modal="true" aria-label="Table of Contents">
        <div class="sheet-handle-row" id="tocHandle">
            <div class="sheet-handle"></div>
        </div>
        <div class="sheet-header">
            <span class="sheet-title">Contents</span>
            <button class="sheet-done-btn">Done</button>
        </div>
        <div class="sheet-scroll">
            <div id="tocContainer">No book loaded.</div>
        </div>
    </div>

    <!-- ── Sheet Overlay ───────────────────────────────────────────────────── -->
    <div id="sheetOverlay"></div>

    <!-- ── Floating "Start from here" popover ──────────────────────────────────
         Anchored to a tapped word. Lives in the MAIN document (never inside the
         EPUB iframe) so it renders above everything and its tap is a clean,
         dedicated user gesture for starting speech on iOS.
    -->
    <div id="wordPopover" class="word-popover hidden" role="button" tabindex="0"
         aria-label="Start reading from here">
        <span class="wp-icon">▶</span>
        <span class="wp-text">Start from here</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
